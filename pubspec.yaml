name: mushafapp
description: "Quran Mushaf app with QPC v4 Tajweed fonts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/v4/

  fonts:
    - family: QCF4Surah
      fonts:
        - asset: assets/fonts/QCF4_QBSML.ttf
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/uthmanic_hafs_v20.ttf
